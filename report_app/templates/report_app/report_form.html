<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Report An Issue | Community Connect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            background-color: #030712;
            color: white;
            font-family: Arial, sans-serif;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 24px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-box {
            background: #2563eb;
            padding: 10px 16px;
            border-radius: 16px;
            font-weight: bold;
            font-size: 22px;
        }

      
        .auth-buttons {
            display: flex;
            gap: 12px;
        }

        .auth-buttons a {
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 14px;
            font-weight: bold;
            transition: 0.3s;
        }

        .login-btn {
            color: #2563eb;
            border: 2px solid #2563eb;
        }

        .login-btn:hover {
            background: #2563eb;
            color: white;
        }

        .signup-btn {
            background: #2563eb;
            color: white;
        }

        .signup-btn:hover {
            background: #1e40af;
        }

        h1 {
            font-size: 32px;
            text-align: center;
            margin-bottom: 30px;
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 40px;
        }

        .step {
            text-align: center;
        }

        .step-circle {
            width: 40px;
            height: 40px;
            background: #2563eb;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            font-weight: bold;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .category-card {
            background: #111827;
            padding: 30px 20px;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .category-card:hover {
            background: #1e2937;
        }

        .category-card input:checked + .category-card {
            background: #2563eb;
            border: 3px solid #60a5fa;
        }

        textarea, input[type="text"] {
            width: 100%;
            background: #111827;
            border: none;
            border-radius: 16px;
            padding: 15px;
            color: white;
        }

        button {
            width: 100%;
            background: #2563eb;
            padding: 18px;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 30px;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1e40af;
        }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">
            <div class="logo-box">cD</div>
            <span style="font-size:22px;">Community Connect</span>
        </div>

        
        <div class="auth-buttons">
            <a href="{% url 'report_app:login' %}" class="login-btn">
                <i class="fa fa-sign-in-alt"></i> Login
            </a>
            <a href="{% url 'report_app:register' %}" class="signup-btn">
                <i class="fa fa-user-plus"></i> Sign Up
            </a>
        </div>
    </div>

    <h1>Report An Issue</h1>

    <div class="step-indicator">
        <div class="step"><div class="step-circle">1</div><p>Type</p></div>
        <div class="step"><div class="step-circle">2</div><p>Describe</p></div>
        <div class="step"><div class="step-circle" style="background:#334155;">3</div><p>Location</p></div>
    </div>

    <form method="POST">
        {% csrf_token %}

        <h2 style="font-size:20px; margin-bottom:15px;">
            STEP 1: What type of problem is this?
        </h2>

        <div class="category-grid">
            <label>
                <input type="radio" name="category" value="water_leak" required>
                <div class="category-card">💧<br>Water Leak</div>
            </label>

            <label>
                <input type="radio" name="category" value="pothole">
                <div class="category-card">🕳️<br>Pothole</div>
            </label>

            <label>
                <input type="radio" name="category" value="electricity">
                <div class="category-card">⚡<br>Electricity</div>
            </label>

            <label>
                <input type="radio" name="category" value="illegal_dumping">
                <div class="category-card">🗑️<br>Illegal Dumping</div>
            </label>

            <label>
                <input type="radio" name="category" value="streetlight">
                <div class="category-card">💡<br>Streetlight</div>
            </label>

            <label>
                <input type="radio" name="category" value="sewer_issue">
                <div class="category-card">🪠<br>Sewer Issue</div>
            </label>
        </div>

        <h2 style="font-size:20px; margin:30px 0 15px 0;">
            STEP 2: Describe the problem (optional)
        </h2>

        <textarea name="description" rows="4"></textarea>

        <h2 style="font-size:20px; margin:30px 0 15px 0;">
            STEP 3: Where is this happening?
        </h2>

        <input type="text" name="location" required placeholder="e.g. 123 Main Street, Diepsloot">

        <button type="submit">Submit Issue</button>
    </form>
</div>

</body>
</html>
